name: Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'     # v0.31.0, v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # v0.31.0-rc.1, v0.31.0-beta.0
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (pack but skip publish)'
        required: false
        default: false
        type: boolean

# Minimal workflow-level permissions; publish-npm job grants id-token: write
permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Required for npm --provenance (OIDC signing via Sigstore)
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false

      - name: Validate tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION. Bump the version first."
            exit 1
          fi
          echo "✅ Tag $TAG matches package.json v$PKG_VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # Build root package first so its dist/types/ is available for
        # @pompelmi/core and other packages that import from 'pompelmi'.
        # pnpm -r excludes the workspace root by default in pnpm v9.
        run: |
          pnpm run build
          pnpm -r --filter '!./examples/*' --if-present run build

      - name: Publish packages
        if: inputs.dry_run != true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: |
          REPO_ROOT=$(pwd)

          # Publish root package
          ROOT_NAME=$(node -p "require('./package.json').name")
          ROOT_VERSION=$(node -p "require('./package.json').version")

          if [ "$(node -p "require('./package.json').private || false")" != "true" ]; then
            EXISTS=$(npm view "$ROOT_NAME@$ROOT_VERSION" version 2>/dev/null || echo "")
            if [ "$EXISTS" != "$ROOT_VERSION" ]; then
              echo "Publishing $ROOT_NAME@$ROOT_VERSION"
              # --ignore-scripts: prepublishOnly already ran via pnpm build above
              # pnpm publish resolves workspace:* references correctly
              pnpm publish --access public --provenance --no-git-checks --ignore-scripts
            else
              echo "$ROOT_NAME@$ROOT_VERSION already exists on npm — skipping"
            fi
          fi

          # Publish workspace packages
          for pkg in packages/*/; do
            PKG_JSON="$REPO_ROOT/$pkg/package.json"
            if [ ! -f "$PKG_JSON" ]; then continue; fi

            PKG_NAME=$(node -p "require('$PKG_JSON').name || ''" 2>/dev/null || echo "")
            PKG_VERSION=$(node -p "require('$PKG_JSON').version || ''" 2>/dev/null || echo "")
            IS_PRIVATE=$(node -p "require('$PKG_JSON').private || false" 2>/dev/null || echo "false")

            if [ -z "$PKG_NAME" ] || [ -z "$PKG_VERSION" ] || [ "$IS_PRIVATE" = "true" ]; then
              continue
            fi

            EXISTS=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
            if [ "$EXISTS" != "$PKG_VERSION" ]; then
              echo "Publishing $PKG_NAME@$PKG_VERSION"
              # pnpm publish must run from the package directory
              (cd "$REPO_ROOT/$pkg" && pnpm publish --access public --provenance --no-git-checks --ignore-scripts)
            else
              echo "$PKG_NAME@$PKG_VERSION already exists on npm — skipping"
            fi
          done

      - name: Dry run summary
        if: inputs.dry_run == true
        run: echo "ℹ️  Dry run — build succeeded, publish skipped."

  publish-container:
    name: Publish Container
    needs: publish-npm
    if: startsWith(github.ref, 'refs/tags/') && inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: packages/engine
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pompelmi-engine:latest
            ghcr.io/${{ github.repository_owner }}/pompelmi-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max